name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  DEPLOY_USER: admin
  DEPLOY_PATH: /home/admin/transitops

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
        if: hashFiles('package-lock.json') != ''

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Build
        if: hashFiles('package.json') != ''
        run: npm run build --if-present

      - name: Test
        if: hashFiles('package.json') != ''
        run: npm test --if-present

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Trust EC2 host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to EC2
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.env' \
            ./ "${{ env.DEPLOY_USER }}@${{ secrets.EC2_HOST }}:${{ env.DEPLOY_PATH }}/"

      - name: Install production deps & restart service
        run: |
          ssh "${{ env.DEPLOY_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            cd '"${{ env.DEPLOY_PATH }}"'
            if [ -f package.json ]; then
              npm ci --omit=dev
            fi
            systemctl --user restart transitops
            systemctl --user status transitops --no-pager -l | head -20
          '
