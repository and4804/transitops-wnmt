name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  # Matches the default Ubuntu EC2 AMI user. Override via repo variable if needed.
  DEPLOY_USER: ubuntu
  DEPLOY_PATH: /home/ubuntu/transitops
  # Baked into the frontend build so API calls hit the right origin.
  PUBLIC_URL: https://transitops.nrg.it.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Trust EC2 host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repo to EC2
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' --exclude '**/node_modules' \
            --exclude 'dist' --exclude '**/dist' \
            --exclude '.env' --exclude '**/.env' \
            --exclude '*.pem' \
            ./ "${{ env.DEPLOY_USER }}@${{ secrets.EC2_HOST }}:${{ env.DEPLOY_PATH }}/"

      - name: Ensure Postgres + ml-service are up to date
        run: |
          ssh "${{ env.DEPLOY_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            cd '"${{ env.DEPLOY_PATH }}"'
            sudo docker compose up -d --build
          '

      - name: Build backend & restart service
        run: |
          ssh "${{ env.DEPLOY_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            cd '"${{ env.DEPLOY_PATH }}"'/backend
            npm ci
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            systemctl --user restart transitops
            sleep 2
            systemctl --user status transitops --no-pager -l | head -20
          '

      - name: Build frontend
        run: |
          ssh "${{ env.DEPLOY_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            cd '"${{ env.DEPLOY_PATH }}"'/frontend
            npm ci
            VITE_API_BASE_URL='"${{ env.PUBLIC_URL }}"' npm run build
          '
