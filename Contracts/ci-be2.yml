name: BE-2 Contract Tests — People & Finance

on:
  pull_request:
    paths:
      - 'services/people-finance/**'
      - 'contracts/be2/**'
  push:
    branches: [main]

env:
  SPECMATIC_VERSION: '2.34.1'
  PROVIDER_URL: http://localhost:8082
  CONTRACT_REPO_URL: https://github.com/transitops/central-contract-repo.git

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/people-finance/package-lock.json

      - name: Install dependencies
        working-directory: services/people-finance
        run: npm ci

      - name: Run unit tests
        working-directory: services/people-finance
        run: npm run test:unit

      - name: Set up JDK (Specmatic runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Specmatic
        run: |
          curl -L -o specmatic.jar \
            "https://github.com/specmatic/specmatic/releases/download/${SPECMATIC_VERSION}/specmatic.jar"

      - name: Start provider app
        working-directory: services/people-finance
        run: |
          npm run build
          npm start &
          npx wait-on ${PROVIDER_URL}/health --timeout 30000

      - name: Run Specmatic contract tests
        working-directory: contracts/be2
        run: java -jar ../../specmatic.jar test --config specmatic.json

      - name: Upload Specmatic report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: be2-specmatic-report
          path: contracts/be2/build/reports/specmatic/

      - name: Run component tests (only after contract tests pass)
        if: success()
        working-directory: services/people-finance
        run: npm run test:component
