services:
  postgres:
    image: postgres:16-alpine
    container_name: transitops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: transitops
      POSTGRES_PASSWORD: transitops
      POSTGRES_DB: transitops
    ports:
      - "5432:5432"
    volumes:
      - transitops_pgdata:/var/lib/postgresql/data

  ml-service:
    build: ./ml-service
    container_name: transitops-ml
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://transitops:transitops@postgres:5432/transitops
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  transitops_pgdata:
